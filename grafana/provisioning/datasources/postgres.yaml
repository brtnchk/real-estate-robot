# Provisioned at Grafana startup. After changing this file you have to
# either restart the grafana container (`docker compose restart grafana`)
# or delete the datasource from the UI and let provisioning recreate it.

apiVersion: 1

datasources:
  - name: olx-postgres
    uid: olx-postgres
    type: postgres
    access: proxy
    # Service name on the docker-compose network, not localhost.
    url: postgres:5432
    user: olx
    secureJsonData:
      password: olx
    jsonData:
      database: olx
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
      maxOpenConns: 10
      maxIdleConns: 2
    isDefault: true
    editable: true